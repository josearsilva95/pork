<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacoes — FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-gray-950 text-white h-screen flex overflow-hidden">

<aside id="sidebar" class="w-64 bg-gray-900 border-r border-gray-800 flex-col shrink-0 hidden lg:flex"></aside>

<div class="flex-1 flex flex-col overflow-hidden">
  <header class="h-16 bg-gray-900/50 border-b border-gray-800 flex items-center px-6 shrink-0 gap-4">
    <h1 class="text-lg font-semibold">Transacoes</h1>
    <button onclick="openModal()" class="ml-auto bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-medium transition">+ Nova</button>
  </header>

  <main class="flex-1 overflow-y-auto p-6">
    <div class="flex gap-3 mb-4 flex-wrap">
      <input id="search" oninput="load()" type="text" placeholder="Buscar..."
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 w-48">
      <select id="typeFilter" onchange="load()"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
        <option value="">Todos</option>
        <option value="income">Receitas</option>
        <option value="expense">Despesas</option>
      </select>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
      <div id="list" class="divide-y divide-gray-800">
        <div class="p-8 text-center text-gray-500">Carregando...</div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-lg font-semibold mb-4">Nova Transacao</h2>
    <div id="modalErr" class="hidden mb-3 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>
    <form id="txForm" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Tipo</label>
          <select id="type" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Valor (R$)</label>
          <input id="amount" type="number" step="0.01" min="0.01" required placeholder="0.00"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Descricao</label>
        <input id="desc" type="text" required placeholder="Ex: Supermercado"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Data</label>
        <input id="date" type="date" required
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 border border-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-800 transition">Cancelar</button>
        <button type="submit" id="saveBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-xl py-2.5 text-sm font-medium transition">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
let userId;
(async () => {
  const session = await requireAuth();
  userId = session.user.id;
  renderLayout('transactions.html');
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  await load();
})();

async function load() {
  const search = document.getElementById('search').value.toLowerCase();
  const type   = document.getElementById('typeFilter').value;
  let q = supabase.from('transactions').select('*').eq('user_id', userId).is('deleted_at', null).order('date', {ascending:false}).limit(50);
  if (type) q = q.eq('type', type);
  const { data } = await q;
  const items = (data||[]).filter(t => !search || t.description.toLowerCase().includes(search));
  const list = document.getElementById('list');
  if (!items.length) { list.innerHTML='<p class="p-8 text-center text-gray-500 text-sm">Nenhuma transacao encontrada</p>'; return; }
  list.innerHTML = items.map(t=>`
    <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800/50 transition group">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm shrink-0 ${t.type==='income'?'bg-emerald-500/10 text-emerald-400':'bg-red-500/10 text-red-400'}">
        ${t.type==='income'?'↑':'↓'}
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-medium text-sm truncate">${t.description}</p>
        <p class="text-xs text-gray-500">${formatDate(t.date)}</p>
      </div>
      <span class="font-mono font-semibold text-sm ${t.type==='income'?'text-emerald-400':'text-red-400'}">
        ${t.type==='income'?'+':'-'}${formatCurrency(t.amount)}
      </span>
      <button onclick="del('${t.id}')" class="opacity-0 group-hover:opacity-100 ml-2 text-gray-500 hover:text-red-400 transition text-xl leading-none">x</button>
    </div>`).join('');
}

async function del(id) {
  if (!confirm('Remover esta transacao?')) return;
  await supabase.from('transactions').update({ deleted_at: new Date().toISOString() }).eq('id', id);
  await load();
}

function openModal()  { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('txForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  const err = document.getElementById('modalErr');
  btn.textContent = 'Salvando...'; btn.disabled = true; err.classList.add('hidden');

  const { error } = await supabase.from('transactions').insert({
    user_id: userId,
    type:        document.getElementById('type').value,
    amount:      parseFloat(document.getElementById('amount').value),
    description: document.getElementById('desc').value,
    date:        document.getElementById('date').value,
    is_paid:     true,
  });

  if (error) { err.textContent = error.message; err.classList.remove('hidden'); }
  else { closeModal(); document.getElementById('txForm').reset(); document.getElementById('date').value = new Date().toISOString().split('T')[0]; await load(); }
  btn.textContent = 'Salvar'; btn.disabled = false;
});
</script>
</body>
</html>
