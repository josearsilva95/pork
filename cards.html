<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartões — FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-gray-950 text-white h-screen flex overflow-hidden">

<aside id="sidebar" class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 hidden lg:flex"></aside>

<div class="flex-1 flex flex-col overflow-hidden">
  <header class="h-16 bg-gray-900/50 border-b border-gray-800 flex items-center px-6 shrink-0">
    <h1 class="text-lg font-semibold">Cartões</h1>
    <button onclick="openModal()" class="ml-auto bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-medium transition">+ Novo cartão</button>
  </header>

  <main class="flex-1 overflow-y-auto p-6">
    <div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center text-gray-500 py-12">Carregando...</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-lg font-semibold mb-4">Novo Cartão</h2>
    <form id="cardForm" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Nome do cartão</label>
        <input id="name" type="text" required placeholder="Ex: Nubank Roxinho"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Bandeira</label>
          <select id="brand" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
            <option value="visa">Visa</option>
            <option value="mastercard">Mastercard</option>
            <option value="elo">Elo</option>
            <option value="amex">Amex</option>
            <option value="other">Outro</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Últimos 4 dígitos</label>
          <input id="last4" type="text" maxlength="4" placeholder="0000"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Limite (R$)</label>
          <input id="limit" type="number" step="0.01" required placeholder="0,00"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Fechamento</label>
          <input id="closing" type="number" min="1" max="31" required placeholder="1-31"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Vencimento</label>
          <input id="due" type="number" min="1" max="31" required placeholder="1-31"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 border border-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-800 transition">Cancelar</button>
        <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-xl py-2.5 text-sm font-medium transition">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
const GRADIENTS = {
  visa:       'from-blue-700 to-blue-900',
  mastercard: 'from-red-600 to-orange-700',
  elo:        'from-yellow-500 to-yellow-700',
  amex:       'from-slate-600 to-slate-800',
  other:      'from-indigo-600 to-violet-700',
};
let userId;

(async () => {
  const session = await requireAuth();
  userId = session.user.id;
  renderLayout('cards.html');
  await load();
})();

async function load() {
  const { data } = await supabase.from('cards').select('*').eq('user_id', userId).is('deleted_at', null).order('name');
  const list = document.getElementById('list');
  if (!data?.length) {
    list.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12"><p class="text-4xl mb-3">💳</p><p>Nenhum cartão cadastrado</p></div>';
    return;
  }
  list.innerHTML = data.map(c => {
    const used = parseFloat(c.used_amount || 0);
    const lim = parseFloat(c.limit_amount || 1);
    const pct = Math.min(100, (used / lim) * 100).toFixed(0);
    const grad = GRADIENTS[c.brand] || GRADIENTS.other;
    return `
    <div class="relative bg-gradient-to-br ${grad} rounded-2xl p-5 text-white overflow-hidden group cursor-pointer">
      <div class="absolute -top-8 -right-8 w-32 h-32 rounded-full bg-white/10"></div>
      <div class="relative">
        <div class="flex justify-between items-start mb-6">
          <p class="font-semibold">${c.name}</p>
          <div class="flex items-center gap-2">
            <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full uppercase">${c.brand}</span>
            <button onclick="del('${c.id}')" class="opacity-0 group-hover:opacity-100 text-white/60 hover:text-white transition text-lg leading-none">×</button>
          </div>
        </div>
        <p class="font-mono text-sm tracking-widest opacity-80">•••• •••• •••• ${c.last_four || '0000'}</p>
        <div class="mt-4 space-y-1">
          <div class="flex justify-between text-xs opacity-80">
            <span>Limite usado</span>
            <span>${formatCurrency(used)} / ${formatCurrency(lim)}</span>
          </div>
          <div class="h-1.5 rounded-full bg-white/20">
            <div class="h-full rounded-full bg-white/70" style="width:${pct}%"></div>
          </div>
          <div class="flex justify-between text-xs opacity-70 pt-1">
            <span>Fecha dia ${c.closing_day}</span>
            <span>Vence dia ${c.due_day}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function del(id) {
  if (!confirm('Remover este cartão?')) return;
  await supabase.from('cards').update({ deleted_at: new Date().toISOString() }).eq('id', id);
  await load();
}

function openModal() { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('cardForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  await supabase.from('cards').insert({
    user_id: userId,
    name: document.getElementById('name').value,
    brand: document.getElementById('brand').value,
    last_four: document.getElementById('last4').value || null,
    limit_amount: parseFloat(document.getElementById('limit').value),
    used_amount: 0,
    closing_day: parseInt(document.getElementById('closing').value),
    due_day: parseInt(document.getElementById('due').value),
  });
  closeModal();
  document.getElementById('cardForm').reset();
  await load();
});
</script>
</body>
</html>
