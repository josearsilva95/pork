<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investimentos — FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="js/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-gray-950 text-white h-screen flex overflow-hidden">

<aside id="sidebar" class="w-64 bg-gray-900 border-r border-gray-800 flex-col shrink-0 hidden lg:flex"></aside>

<div class="flex-1 flex flex-col overflow-hidden">
  <header class="h-16 bg-gray-900/50 border-b border-gray-800 flex items-center px-6 shrink-0">
    <h1 class="text-lg font-semibold">Investimentos</h1>
    <button onclick="openModal()" class="ml-auto bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-medium transition">+ Novo</button>
  </header>
  <main class="flex-1 overflow-y-auto p-6 space-y-4">
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
        <p class="text-xs text-gray-400">Total Investido</p>
        <p id="totalInv" class="text-xl font-bold font-mono mt-1">...</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
        <p class="text-xs text-gray-400">Valor Atual</p>
        <p id="currentVal" class="text-xl font-bold font-mono mt-1 text-indigo-400">...</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
        <p class="text-xs text-gray-400">Resultado</p>
        <p id="result" class="text-xl font-bold font-mono mt-1">...</p>
      </div>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
      <div id="list" class="divide-y divide-gray-800">
        <div class="p-8 text-center text-gray-500">Carregando...</div>
      </div>
    </div>
  </main>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-lg font-semibold mb-4">Novo Investimento</h2>
    <form id="invForm" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Nome</label>
        <input id="name" type="text" required placeholder="Ex: Tesouro Selic 2029"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Tipo</label>
          <select id="type" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
            <option value="tesouro_direto">Tesouro Direto</option>
            <option value="cdb">CDB</option>
            <option value="lci">LCI/LCA</option>
            <option value="stocks">Acoes</option>
            <option value="fiis">FIIs</option>
            <option value="etf">ETF</option>
            <option value="crypto">Cripto</option>
            <option value="other">Outro</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Ticker (opcional)</label>
          <input id="ticker" type="text" placeholder="PETR4, BTC..."
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Valor investido (R$)</label>
          <input id="invested" type="number" step="0.01" required placeholder="0.00"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Valor atual (R$)</label>
          <input id="current" type="number" step="0.01" placeholder="0.00"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 border border-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-800 transition">Cancelar</button>
        <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-xl py-2.5 text-sm font-medium transition">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
const LABELS = {tesouro_direto:'Tesouro Direto',cdb:'CDB',lci:'LCI/LCA',stocks:'Acoes',fiis:'FIIs',etf:'ETF',crypto:'Cripto',other:'Outro'};
let userId;

(async () => {
  const session = await requireAuth();
  userId = session.user.id;
  renderLayout('investments.html');
  await load();
})();

async function load() {
  const { data } = await db.from('investments').select('*').eq('user_id', userId).is('deleted_at', null).order('name');
  const inv   = (data||[]).reduce((s,i)=>s+parseFloat(i.invested_amount),0);
  const cur   = (data||[]).reduce((s,i)=>s+parseFloat(i.current_value||i.invested_amount),0);
  const gain  = cur - inv;
  document.getElementById('totalInv'  ).textContent = formatCurrency(inv);
  document.getElementById('currentVal').textContent = formatCurrency(cur);
  const rEl = document.getElementById('result');
  rEl.textContent  = (gain>=0?'+':'')+formatCurrency(gain);
  rEl.className = `text-xl font-bold font-mono mt-1 ${gain>=0?'text-emerald-400':'text-red-400'}`;
  const list = document.getElementById('list');
  if (!data?.length) { list.innerHTML='<p class="p-8 text-center text-gray-500">Nenhum investimento</p>'; return; }
  list.innerHTML = data.map(i=>{
    const c=parseFloat(i.current_value||i.invested_amount), v=parseFloat(i.invested_amount), g=c-v, r=v>0?((g/v)*100).toFixed(2):'0.00';
    return `
    <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800/50 transition group">
      <div class="w-9 h-9 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 font-bold text-sm shrink-0">
        ${(LABELS[i.type]||'I')[0]}
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-medium text-sm">${i.name}${i.ticker?` <span class="text-gray-500">(${i.ticker})</span>`:''}</p>
        <p class="text-xs text-gray-500">${LABELS[i.type]||i.type}</p>
      </div>
      <div class="text-right">
        <p class="font-mono font-semibold text-sm">${formatCurrency(c)}</p>
        <p class="text-xs font-mono ${g>=0?'text-emerald-400':'text-red-400'}">${g>=0?'+':''}${formatCurrency(g)} (${r}%)</p>
      </div>
      <button onclick="del('${i.id}')" class="opacity-0 group-hover:opacity-100 ml-2 text-gray-500 hover:text-red-400 transition text-xl leading-none">x</button>
    </div>`}).join('');
}

async function del(id) { if (!confirm('Remover?')) return; await db.from('investments').update({deleted_at:new Date().toISOString()}).eq('id',id); await load(); }
function openModal()  { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('invForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const inv = parseFloat(document.getElementById('invested').value);
  const cur = parseFloat(document.getElementById('current').value)||inv;
  await db.from('investments').insert({user_id:userId, name:document.getElementById('name').value, type:document.getElementById('type').value, ticker:document.getElementById('ticker').value||null, invested_amount:inv, current_value:cur, quantity:1, avg_price:inv});
  closeModal(); document.getElementById('invForm').reset(); await load();
});
</script>
</body>
</html>
